<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Institute Dashboard • JobSprint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/institutes/placement.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo" data-brand-logo>JS</div>
        <div><div class="brand-name" data-brand-name>Institute</div><div class="brand-sub" data-brand-sub>Placement Center</div></div>
      </div>
      <nav>
        <a data-nav="dashboard" href="/institutes/dashboard.html">Dashboard</a>
        <a data-nav="students" href="/institutes/students.html">Students</a>
        <a data-nav="drives" href="/institutes/drives.html">Drives</a>
        <a data-nav="counselling" href="/institutes/counselling.html">Counselling</a>
      </nav>
    </aside>
    <main class="content">
      <div class="topbar"><div><h1>Placement Dashboard</h1><small>Overview of placement readiness</small></div><strong data-brand-name>Institute</strong></div>
      <section class="card">
        <h2 class="section-title">Placement Funnel</h2>
        <div class="grid-3" id="funnel-metrics"></div>
      </section>
      <section class="card">
        <h2 class="section-title">Upcoming Placement Drives</h2>
        <div class="table-wrap">
          <table><thead><tr><th>Company</th><th>Role</th><th>Date</th><th>Min CGPA</th><th>Status</th></tr></thead><tbody id="upcoming-drives"></tbody></table>
        </div>
      </section>
      <section class="card">
        <h2 class="section-title">High-Risk Students</h2>
        <div class="table-wrap">
          <table><thead><tr><th>Name</th><th>Department</th><th>CGPA</th><th>Risk</th></tr></thead><tbody id="high-risk-students"></tbody></table>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { applications, drives, students } from '/institutes/demo-data.js';
    import { applyBranding, formatDate, loadInstituteBranding, requireInstituteAuth, setActiveNav } from '/institutes/app-shell.js';

    const token = requireInstituteAuth();
    if (token) {
      loadInstituteBranding(token).then(applyBranding);
    }
    setActiveNav('dashboard');

    const stages = ['applied', 'interview', 'offer', 'rejected'];
    const counts = stages.reduce((acc, stage) => ({ ...acc, [stage]: applications.filter((item) => item.stage === stage).length }), {});
    const totalApplications = applications.length;

    document.getElementById('funnel-metrics').innerHTML = `
      <div class="metric"><div class="label">Total Applications</div><div class="value">${totalApplications}</div></div>
      <div class="metric"><div class="label">Interviews</div><div class="value">${counts.interview}</div></div>
      <div class="metric"><div class="label">Offers</div><div class="value">${counts.offer}</div></div>
    `;

    const upcoming = drives
      .filter((drive) => drive.status === 'upcoming')
      .sort((a, b) => new Date(a.date) - new Date(b.date))
      .slice(0, 5);

    document.getElementById('upcoming-drives').innerHTML = upcoming
      .map((drive) => `<tr class="clickable" data-id="${drive.id}"><td>${drive.company}</td><td>${drive.role}</td><td>${formatDate(drive.date)}</td><td>${drive.min_cgpa.toFixed(1)}</td><td><span class="pill ${drive.status}">${drive.status}</span></td></tr>`)
      .join('');

    const riskRank = { high: 0, medium: 1, low: 2 };
    const highRisk = [...students]
      .sort((a, b) => (riskRank[a.risk_level] - riskRank[b.risk_level]) || (a.cgpa - b.cgpa))
      .slice(0, 8);

    document.getElementById('high-risk-students').innerHTML = highRisk
      .map((student) => `<tr class="clickable" data-id="${student.id}"><td>${student.name}</td><td>${student.dept}</td><td>${student.cgpa.toFixed(2)}</td><td><span class="pill ${student.risk_level}">${student.risk_level}</span></td></tr>`)
      .join('');

    document.getElementById('upcoming-drives').addEventListener('click', (event) => {
      const row = event.target.closest('tr[data-id]');
      if (row) window.location.href = `/institutes/drive.html?drive_id=${row.dataset.id}`;
    });

    document.getElementById('high-risk-students').addEventListener('click', (event) => {
      const row = event.target.closest('tr[data-id]');
      if (row) window.location.href = `/institutes/student.html?student_id=${row.dataset.id}`;
    });
  </script>
</body>
</html>
