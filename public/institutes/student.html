<!doctype html><html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Student Profile • JobSprint</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/theme.css"><link rel="stylesheet" href="/institutes/placement.css"></head><body>
<div class="layout"><aside class="sidebar"><div class="brand"><div class="brand-logo" data-brand-logo>JS</div><div><div class="brand-name" data-brand-name>Institute</div><div class="brand-sub" data-brand-sub>Placement Center</div></div></div><nav><a data-nav="dashboard" href="/institutes/dashboard.html">Dashboard</a><a data-nav="students" href="/institutes/students.html">Students</a><a data-nav="drives" href="/institutes/drives.html">Drives</a><a data-nav="counselling" href="/institutes/counselling.html">Counselling</a></nav></aside>
<main class="content"><div class="topbar"><div><h1 id="student-name">Student Profile</h1><small id="student-meta">Placement journey and counselling data</small></div><a class="btn secondary" href="/institutes/students.html">Back to students</a></div>
<section class="card"><div class="section-head"><h2 class="section-title">Placement Journey</h2><div class="section-actions"><button class="btn secondary" data-placeholder-action="Sync" data-section="Placement Journey">Sync</button><button class="btn secondary" data-placeholder-action="Add / Edit / Remove" data-section="Placement Journey">Manage Data</button></div></div><div class="table-wrap"><table><thead><tr><th>Company</th><th>Role</th><th>Drive Date</th><th>Stage</th></tr></thead><tbody id="journey-rows"></tbody></table></div></section>
<section class="card"><div class="section-head"><h2 class="section-title">Counselling</h2><div class="section-actions"><button class="btn secondary" data-placeholder-action="Sync" data-section="Counselling">Sync</button><button class="btn secondary" data-placeholder-action="Add / Edit / Remove" data-section="Counselling">Manage Data</button></div></div><h3>Sessions</h3><div class="table-wrap"><table><thead><tr><th>Scheduled At</th><th>Status</th></tr></thead><tbody id="session-rows"></tbody></table></div><h3>Notes</h3><ul id="note-list"></ul><div class="actions"><button class="btn primary" disabled>Schedule Counselling (Coming soon)</button><button class="btn secondary" disabled>Add Note (Coming soon)</button></div></section>
</main></div>
<script type="module">
import { applications, counselling_notes, counselling_sessions, drives, students } from '/institutes/demo-data.js';
import { applyBranding, bindPlaceholderActions, formatDate, formatDateTime, getQueryNumber, loadInstituteBranding, requireInstituteAuth, setActiveNav } from '/institutes/app-shell.js';
const token=requireInstituteAuth(); if(token) loadInstituteBranding(token).then(applyBranding); setActiveNav('students'); bindPlaceholderActions();
const studentId=getQueryNumber('student_id'); const student=students.find((s)=>s.id===studentId);
if(!student){document.getElementById('student-name').textContent='Student not found';}
else {
 document.getElementById('student-name').textContent = student.name;
 document.getElementById('student-meta').textContent = `${student.dept} • CGPA ${student.cgpa.toFixed(2)} • Batch ${student.batch_year} • Risk ${student.risk_level}`;
 const journey = applications.filter((app)=>app.student_id===student.id).map((app)=>({ app, drive: drives.find((drive)=>drive.id===app.drive_id) })).filter((row)=>row.drive).sort((a,b)=>new Date(a.drive.date)-new Date(b.drive.date));
 document.getElementById('journey-rows').innerHTML = journey.map(({app,drive})=>`<tr><td>${drive.company}</td><td>${drive.role}</td><td>${formatDate(drive.date)}</td><td><span class="pill ${app.stage}">${app.stage}</span></td></tr>`).join('') || '<tr><td colspan="4">No placement records for this student.</td></tr>';
 const sessions = counselling_sessions.filter((session)=>session.student_id===student.id).sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
 document.getElementById('session-rows').innerHTML = sessions.map((session)=>`<tr><td>${formatDateTime(session.scheduled_at)}</td><td><span class="pill ${session.status}">${session.status}</span></td></tr>`).join('') || '<tr><td colspan="2">No counselling sessions found.</td></tr>';
 const notes = counselling_notes.filter((note)=>note.student_id===student.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
 document.getElementById('note-list').innerHTML = notes.map((note)=>`<li><strong>${formatDateTime(note.created_at)}:</strong> ${note.note}</li>`).join('') || '<li>No counselling notes yet.</li>';
}
</script></body></html>
