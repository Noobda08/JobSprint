<!doctype html><html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Student Profile • JobSprint</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/theme.css"><link rel="stylesheet" href="/institutes/placement.css"></head><body>
<div class="layout"><aside class="sidebar"><div class="brand"><div class="brand-copy"><div class="brand-name" data-brand-name>Institute</div><div class="brand-sub" data-brand-sub>Placement Center</div><div class="brand-panel-logo" data-brand-panel-logo hidden><img data-brand-panel-logo-img alt="Institution logo"></div></div></div><nav><a data-nav="dashboard" href="/institutes/dashboard.html">Dashboard</a><a data-nav="students" href="/institutes/students.html">Students</a><a data-nav="drives" href="/institutes/drives.html">Drives</a><a data-nav="counselling" href="/institutes/counselling.html">Counselling</a></nav><div class="sidebar-account"><div class="sidebar-account-name" data-user-name>Signed-in user</div><button class="btn secondary sidebar-logout" type="button" data-logout>Log out</button></div></aside>
<main class="content"><div class="topbar"><div><h1 id="student-name">Student Profile</h1><small id="student-meta">Placement journey and counselling data</small></div><a class="btn secondary" href="/institutes/students.html">Back to students</a></div>
<section class="card"><div class="section-head"><h2 class="section-title">Placement Journey</h2><div class="section-actions"><button class="btn secondary" data-upload-dataset="applications">Upload CSV</button><button class="btn secondary" data-download-sample="applications">Sample CSV</button><button class="btn secondary" data-manage-dataset="applications">Manage</button><button class="btn secondary" data-placeholder-action="Sync" data-section="Placement Journey">Sync</button></div></div><div class="table-wrap"><table><thead><tr><th>Company</th><th>Role</th><th>Drive Date</th><th>Stage</th></tr></thead><tbody id="journey-rows"></tbody></table></div></section>
<section class="card"><div class="section-head"><h2 class="section-title">Counselling</h2><div class="section-actions"><button class="btn secondary" data-upload-dataset="counselling_sessions">Upload Sessions CSV</button><button class="btn secondary" data-download-sample="counselling_sessions">Sample CSV</button><button class="btn secondary" data-manage-dataset="counselling_sessions">Manage</button><button class="btn secondary" data-upload-dataset="counselling_notes">Upload Notes CSV</button><button class="btn secondary" data-download-sample="counselling_notes">Sample CSV</button><button class="btn secondary" data-manage-dataset="counselling_notes">Manage</button><button class="btn secondary" data-placeholder-action="Sync" data-section="Counselling">Sync</button></div></div><h3>Sessions</h3><div class="table-wrap"><table><thead><tr><th>Scheduled At</th><th>Status</th></tr></thead><tbody id="session-rows"></tbody></table></div><h3>Notes</h3><ul id="note-list"></ul><div class="actions"><button class="btn primary" disabled>Schedule Counselling (Coming soon)</button><button class="btn secondary" disabled>Add Note (Coming soon)</button></div></section>
</main></div>
<script type="module">
import { loadPlacementData } from '/institutes/data-client.js';
import { applyBranding, bindCsvUploadActions, bindPlaceholderActions, bindRecordManagement, bindSampleCsvDownloads, bindInstituteAccountPanel, formatDate, formatDateTime, getQueryNumber, loadInstituteBranding, requireInstituteAuth, setActiveNav } from '/institutes/app-shell.js';
const token=requireInstituteAuth(); if(!token) throw new Error('Unauthorized'); bindInstituteAccountPanel(token); loadInstituteBranding(token).then(applyBranding); setActiveNav('students'); bindPlaceholderActions(); bindSampleCsvDownloads();
const studentId=String(getQueryNumber('student_id') || '');
async function render(){
 const { applications = [], counselling_notes = [], counselling_sessions = [], drives = [], students = [] } = await loadPlacementData(token, { force: true });
 const student=students.find((s)=>String(s.id)===studentId);
 if(!student){document.getElementById('student-name').textContent='Student not found'; return;}
 document.getElementById('student-name').textContent = student.name;
 document.getElementById('student-meta').textContent = `${student.dept || '-'} • CGPA ${Number(student.cgpa || 0).toFixed(2)} • Batch ${student.batch_year || '-'} • Risk ${student.risk_level || 'low'}`;
 const drivesById = new Map(drives.map((drive)=>[String(drive.id), drive]));
 const journey = applications.filter((app)=>String(app.student_id)===studentId).map((app)=>({ app, drive: drivesById.get(String(app.drive_id)) })).filter((row)=>row.drive).sort((a,b)=>new Date(a.drive.date)-new Date(b.drive.date));
 document.getElementById('journey-rows').innerHTML = journey.map(({app,drive})=>`<tr><td>${drive.company}</td><td>${drive.role}</td><td>${formatDate(drive.date)}</td><td><span class="pill ${app.stage}">${app.stage}</span></td></tr>`).join('') || '<tr><td colspan="4">No placement records for this student.</td></tr>';
 const sessions = counselling_sessions.filter((session)=>String(session.student_id)===studentId).sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
 document.getElementById('session-rows').innerHTML = sessions.map((session)=>`<tr><td>${formatDateTime(session.scheduled_at)}</td><td><span class="pill ${session.status}">${session.status}</span></td></tr>`).join('') || '<tr><td colspan="2">No counselling sessions found.</td></tr>';
 const notes = counselling_notes.filter((note)=>String(note.student_id)===studentId).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
 document.getElementById('note-list').innerHTML = notes.map((note)=>`<li><strong>${formatDateTime(note.created_at)}:</strong> ${note.note}</li>`).join('') || '<li>No counselling notes yet.</li>';
}
bindRecordManagement(token, { onChanged: render });
    bindCsvUploadActions(token, { onUploaded: render });
await render();
</script></body></html>
