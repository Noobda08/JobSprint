<!doctype html><html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Students • JobSprint</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/theme.css"><link rel="stylesheet" href="/institutes/placement.css"></head><body>
<div class="layout"><aside class="sidebar"><div class="brand"><div class="brand-logo" data-brand-logo>JS</div><div><div class="brand-name" data-brand-name>Institute</div><div class="brand-sub" data-brand-sub>Placement Center</div></div></div><nav><a data-nav="dashboard" href="/institutes/dashboard.html">Dashboard</a><a data-nav="students" href="/institutes/students.html">Students</a><a data-nav="drives" href="/institutes/drives.html">Drives</a><a data-nav="counselling" href="/institutes/counselling.html">Counselling</a></nav></aside>
<main class="content"><div class="topbar"><div><h1>Students</h1><small>Placement readiness roster</small></div><strong data-brand-name>Institute</strong></div>
<section class="card"><div class="section-head"><h2 class="section-title">Student Master</h2><div class="section-actions"><button class="btn primary" data-placeholder-action="Create Student" data-section="Students">Create Student</button><button class="btn secondary" data-placeholder-action="Sync" data-section="Students">Sync</button><button class="btn secondary" data-placeholder-action="Add / Edit / Remove" data-section="Students">Manage Data</button></div></div><div class="filters"><div><label>Department</label><select id="dept-filter"><option value="">All</option></select></div><div><label>Min CGPA</label><input id="min-cgpa" type="number" min="0" max="10" step="0.1"></div><div><label>Max CGPA</label><input id="max-cgpa" type="number" min="0" max="10" step="0.1"></div><div><label>Risk Level</label><select id="risk-filter"><option value="">All</option><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div></div>
<div class="table-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Dept</th><th>CGPA</th><th>Batch</th><th>Risk</th></tr></thead><tbody id="student-rows"></tbody></table></div>
</section></main></div>
<script type="module">
import { students } from '/institutes/demo-data.js';
import { applyBranding, bindPlaceholderActions, loadInstituteBranding, requireInstituteAuth, setActiveNav } from '/institutes/app-shell.js';
const token=requireInstituteAuth(); if(token) loadInstituteBranding(token).then(applyBranding); setActiveNav('students'); bindPlaceholderActions();
const deptFilter=document.getElementById('dept-filter'); const minCgpa=document.getElementById('min-cgpa'); const maxCgpa=document.getElementById('max-cgpa'); const riskFilter=document.getElementById('risk-filter'); const tbody=document.getElementById('student-rows');
[...new Set(students.map((s)=>s.dept))].sort().forEach((dept)=>{const option=document.createElement('option');option.value=dept;option.textContent=dept;deptFilter.append(option);});
function renderRows(){const min=Number(minCgpa.value||0); const max=Number(maxCgpa.value||10); const dept=deptFilter.value; const risk=riskFilter.value;
const filtered=students.filter((s)=>(!dept||s.dept===dept)&&(!risk||s.risk_level===risk)&&s.cgpa>=min&&s.cgpa<=max);
tbody.innerHTML=filtered.map((s)=>`<tr class="clickable" data-id="${s.id}"><td>${s.name}</td><td>${s.email}</td><td>${s.dept}</td><td>${s.cgpa.toFixed(2)}</td><td>${s.batch_year}</td><td><span class="pill ${s.risk_level}">${s.risk_level}</span></td></tr>`).join('') || '<tr><td colspan="6">No students found.</td></tr>';
}
[deptFilter,minCgpa,maxCgpa,riskFilter].forEach((el)=>el.addEventListener('input',renderRows));
tbody.addEventListener('click',(event)=>{const row=event.target.closest('tr[data-id]'); if(row) window.location.href=`/institutes/student.html?student_id=${row.dataset.id}`;});
renderRows();
</script></body></html>
