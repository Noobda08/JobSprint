<!doctype html><html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Counselling • JobSprint</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/theme.css"><link rel="stylesheet" href="/institutes/placement.css"></head><body>
<div class="layout"><aside class="sidebar"><div class="brand"><div class="brand-logo" data-brand-logo>JS</div><div><div class="brand-name" data-brand-name>Institute</div><div class="brand-sub" data-brand-sub>Placement Center</div></div></div><nav><a data-nav="dashboard" href="/institutes/dashboard.html">Dashboard</a><a data-nav="students" href="/institutes/students.html">Students</a><a data-nav="drives" href="/institutes/drives.html">Drives</a><a data-nav="counselling" href="/institutes/counselling.html">Counselling</a></nav></aside>
<main class="content"><div class="topbar"><div><h1>Counselling Sessions</h1><small>Manage student intervention queue</small></div><strong data-brand-name>Institute</strong></div>
<section class="card"><div class="filters"><div><label>Status</label><select id="status-filter"><option value="">All</option><option value="scheduled">Scheduled</option><option value="completed">Completed</option><option value="rescheduled">Rescheduled</option><option value="cancelled">Cancelled</option></select></div><div><label>From</label><input type="date" id="from-date"></div><div><label>To</label><input type="date" id="to-date"></div></div>
<div class="table-wrap"><table><thead><tr><th>Student</th><th>Department</th><th>Scheduled Time</th><th>Status</th></tr></thead><tbody id="session-rows"></tbody></table></div></section></main></div>
<script type="module">
import { counselling_sessions, students } from '/institutes/demo-data.js';
import { applyBranding, formatDateTime, loadInstituteBranding, requireInstituteAuth, setActiveNav } from '/institutes/app-shell.js';
const token=requireInstituteAuth(); if(token) loadInstituteBranding(token).then(applyBranding); setActiveNav('counselling');
const statusFilter=document.getElementById('status-filter'); const fromDate=document.getElementById('from-date'); const toDate=document.getElementById('to-date'); const tbody=document.getElementById('session-rows');
function renderRows(){ const status=statusFilter.value; const from=fromDate.value? new Date(fromDate.value):null; const to=toDate.value? new Date(toDate.value+'T23:59:59'):null;
const filtered=counselling_sessions.filter((session)=>{const date=new Date(session.scheduled_at); return (!status||session.status===status)&&(!from||date>=from)&&(!to||date<=to);}).sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
tbody.innerHTML=filtered.map((session)=>{const student=students.find((s)=>s.id===session.student_id); if(!student) return ''; return `<tr class="clickable" data-student="${student.id}"><td>${student.name}</td><td>${student.dept}</td><td>${formatDateTime(session.scheduled_at)}</td><td><span class="pill ${session.status}">${session.status}</span></td></tr>`;}).join('') || '<tr><td colspan="4">No counselling sessions found.</td></tr>';
}
[statusFilter,fromDate,toDate].forEach((el)=>el.addEventListener('input',renderRows));
tbody.addEventListener('click',(event)=>{const row=event.target.closest('tr[data-student]'); if(row) window.location.href=`/institutes/student.html?student_id=${row.dataset.student}`;});
renderRows();
</script></body></html>
